version: '3.8'

services:
  rclone-commander:
    image: ghcr.io/thinkaliker/rclonecommander:latest
    container_name: rclone-commander
    # PUID/PGID allow the container to match your host user permissions
    environment:
      - NODE_ENV=production
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    ports:
      - "3001:3001"
    volumes:
      # Map your host system's rclone configuration file (read-only for safety)
      - ~/.config/rclone/rclone.conf:/config/rclone.conf:ro
      # Required: Map a specific host directory you want to copy files to/from
      # - /path/on/your/host:/target:rw
    restart: unless-stopped
